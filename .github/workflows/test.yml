name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - '30.2'
          - 'snapshot'

    # Emacs 29.4 has a known EIEIO byte-compilation bug that causes
    # invalid-function errors for cross-file defun references in
    # cl-defmethod dispatch.  Allow 29.4 to fail without blocking CI.
    continue-on-error: ${{ matrix.emacs_version == '29.4' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Cache Eldev dependencies
        uses: actions/cache@v4
        with:
          path: ~/.emacs.d/eldev
          key: ${{ runner.os }}-eldev-test-v1-${{ matrix.emacs_version }}-${{ hashFiles('Eldev') }}
          restore-keys: |
            ${{ runner.os }}-eldev-test-v1-${{ matrix.emacs_version }}-

      - name: Install Eldev
        run: curl --fail --silent --show-error --location https://raw.github.com/doublep/eldev/master/webinstall/github-eldev | sh

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install Beads via Homebrew
        run: |
          brew tap steveyegge/beads
          brew install bd

      - name: Verify Beads installation
        run: bd version

      - name: Install Dolt
        run: sudo bash -c 'curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | bash'

      - name: Verify Dolt installation
        run: dolt version

      - name: Clone beads.el dependency
        run: |
          mkdir -p ~/workspace
          git clone https://github.com/r0man/beads.el.git ~/workspace/beads.el

      - name: Run tests
        # BD_NO_DAEMON=1: unit tests use file-backed bd storage, never connect
        # to the production Dolt server on port 3307.  Integration tests that
        # need real Dolt use gastown-test-with-dolt-server, which removes
        # BD_NO_DAEMON from the subprocess environment and routes bd commands
        # to an isolated server on a random port.
        # gt CLI not needed for current tests (command-line building only).
        run: BD_NO_DAEMON=1 eldev -p -dtT test
